version: '3'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: soc-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      # Encryption key for re-initialization (generate with: openssl rand -hex 32)
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}

      # Basic Auth
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}

      # Default owner account (skips setup wizard on first boot)
      - N8N_DEFAULT_EMAIL=${N8N_DEFAULT_EMAIL:-admin@soc.local}
      - N8N_DEFAULT_FIRST_NAME=${N8N_DEFAULT_FIRST_NAME:-SOC}
      - N8N_DEFAULT_LAST_NAME=${N8N_DEFAULT_LAST_NAME:-Admin}
      - N8N_DEFAULT_PASSWORD=${N8N_DEFAULT_PASSWORD}
      - N8N_OWNER_CREATE_ALLOWED=true

      # PostgreSQL database configuration
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_POSTGRES_PASSWORD}
      - DB_POSTGRESDB_SCHEMA=public

      # Cookie settings
      - N8N_COOKIE_SECURE=false
      - N8N_COOKIE_SAME_SITE=lax

      # Server settings
      - N8N_HOST=${N8N_HOST:-0.0.0.0}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-America/New_York}

      # Execution settings
      - EXECUTIONS_DATA_PRUNE=${EXECUTIONS_DATA_PRUNE:-true}
      - EXECUTIONS_DATA_MAX_AGE=${EXECUTIONS_DATA_MAX_AGE:-168}
      - NODE_ENV=production
      - EXECUTIONS_TIMEOUT=${EXECUTIONS_TIMEOUT:-600}
      - EXECUTIONS_TIMEOUT_MAX=${EXECUTIONS_TIMEOUT_MAX:-3600}
    volumes:
      - n8n_data:/home/node/.n8n
      - n8n_files:/home/node/.n8n-files
      - ${PWD}/workflows:/home/node/workflows
    networks:
      - ${SOC_NETWORK_NAME:-soc-net}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: soc-n8n-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${N8N_POSTGRES_PASSWORD}
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    networks:
      - ${SOC_NETWORK_NAME:-soc-net}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  n8n_data:
  n8n_files:
  n8n_postgres_data:

networks:
  ${SOC_NETWORK_NAME:-soc-net}:
    name: ${SOC_NETWORK_NAME:-soc-net}
    driver: bridge
