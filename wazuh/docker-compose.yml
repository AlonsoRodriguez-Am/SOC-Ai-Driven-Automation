version: '3'

services:
  wazuh.master:
    image: wazuh/wazuh:4.14.3
    hostname: wazuh.master
    container_name: wazuh-master
    ports:
      - "1514:1514"
      - "1515:1515"
      - "55000:55000"
    volumes:
      - ./data/master:/var/ossec/data
      - ./data/certs:/var/ossec/etc/sslmanager
      - ./logs:/var/ossec/logs
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=admin
      - FILEBEAT_ENABLED=true
    networks:
      - soc-net
    restart: unless-stopped

  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.14.3
    hostname: wazuh.indexer
    container_name: wazuh-indexer
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - ./data/indexer:/usr/share/wazuh-indexer/data
      - ./data/certs:/usr/share/wazuh-indexer/certs/
    environment:
      - "discovery.type=single-node"
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - -Ebootstrap.password=admin
      - "plugins.security.enabled=true"
      - "plugins.security.ssl.http.enabled=false"
      - "plugins.security.ssl.transport.enabled=false"
      - "plugins.security.allow_insecure_defaults=true"
    networks:
      - soc-net
    restart: unless-stopped

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.14.3
    hostname: wazuh.dashboard
    container_name: wazuh-dashboard
    ports:
      - "443:5601"
    volumes:
      - ./data/dashboard:/usr/share/wazuh-dashboard/data
      - ./data/certs:/usr/share/wazuh-dashboard/certs/
    environment:
      - WAUH_URL=https://wazuh.master
      - WAUH_PORT=55000
      - OPENSEARCH_HOSTS=https://wazuh.indexer:9200
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=admin
      - WAUH_USERNAME=admin
      - WAUH_PASSWORD=admin
    depends_on:
      - wazuh.indexer
      - wazuh.master
    networks:
      - soc-net
    restart: unless-stopped

networks:
  soc-net:
    driver: bridge